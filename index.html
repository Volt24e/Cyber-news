<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CyberSec News | Premium Security Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.15) 0%, transparent 50%);
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) translateX(100px);
                opacity: 0;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Glass Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 5px;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
        }

        /* Search */
        .search-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-wrapper {
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 16px;
            color: white;
            font-family: 'Inter', sans-serif;
        }

        .search-input:focus {
            outline: none;
            border-color: #6366f1;
        }

        .search-input::placeholder {
            color: #64748b;
        }

        /* Filters */
        .filters-section {
            margin-bottom: 30px;
        }

        .filters-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: #6366f1;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-color: transparent;
            color: white;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .incident-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .incident-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
        }

        .severity-bar {
            height: 4px;
        }

        .card-content {
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .severity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .severity-critical {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }

        .severity-high {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }

        .severity-medium {
            background: linear-gradient(135deg, #eab308, #ca8a04);
            color: white;
        }

        .severity-low {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .source {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-summary {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date {
            font-size: 12px;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .read-more {
            font-size: 13px;
            font-weight: 600;
            color: #a5b4fc;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            max-width: 600px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 32px;
            padding: 32px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .modal-close {
            float: right;
            font-size: 28px;
            cursor: pointer;
            color: #94a3b8;
            margin: -10px -10px 0 0;
        }

        .modal-close:hover {
            color: white;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            margin-top: 0;
            padding-right: 30px;
        }

        .modal-meta {
            background: rgba(99, 102, 241, 0.1);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 24px;
        }

        .modal-meta-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .modal-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            .glass-header {
                padding: 20px;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <div class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-shield-haltered"></i>
                    </div>
                    <div class="logo-text">
                        <h1>CyberSec News</h1>
                        <p>Premium Security Intelligence</p>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-label">Active Threats</div>
                        <div class="stat-value" id="totalCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Last Update</div>
                        <div class="stat-value" id="updateTime">--:--</div>
                    </div>
                    <button class="refresh-btn" onclick="loadData()">
                        <i class="fas fa-sync-alt"></i>
                        Refresh
                    </button>
                </div>
            </div>
        </div>

        <div class="search-glass">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search incidents..." onkeyup="filterData()">
            </div>
        </div>

        <div class="filters-section">
            <div class="filters-title">
                <i class="fas fa-filter"></i>
                <span>Filter by Severity</span>
            </div>
            <div class="filters" id="filters"></div>
        </div>

        <div id="incidentsContainer"></div>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <i class="fas fa-times modal-close" onclick="closeModal()"></i>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // Create particles
        for(let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 15 + Math.random() * 10 + 's';
            document.getElementById('bgAnimation').appendChild(particle);
        }

        let incidents = [];
        let currentFilter = 'all';

        const data = [
            { id: 1, title: 'CRITICAL: Major Healthcare Ransomware Attack', summary: 'Major healthcare provider hit by sophisticated ransomware attack affecting patient records. Attackers demanding $5M ransom.', date: '2026-05-19', source: 'HealthSec', severity: 'critical' },
            { id: 2, title: 'Data Breach Exposes 10 Million User Records', summary: 'Popular social media platform suffered massive data breach exposing emails, passwords, and personal data of 10M users.', date: '2026-05-19', source: 'DataBreach', severity: 'high' },
            { id: 3, title: 'Chrome Zero-Day Under Active Attack', summary: 'Google releases emergency patch for zero-day vulnerability in Chrome being actively exploited.', date: '2026-05-18', source: 'Google Security', severity: 'critical' },
            { id: 4, title: 'Major DDoS Attack Hits Financial Sector', summary: 'Multiple banks experiencing coordinated DDoS attacks causing service disruptions.', date: '2026-05-18', source: 'FinSec', severity: 'medium' },
            { id: 5, title: 'Cryptocurrency Phishing Campaign', summary: 'Sophisticated phishing campaign targets crypto users, stealing over $10M in digital assets.', date: '2026-05-17', source: 'CryptoAlert', severity: 'medium' },
            { id: 6, title: 'SCADA Vulnerability in Power Grid', summary: 'Critical vulnerability in industrial control systems could allow attackers to disrupt power grids.', date: '2026-05-17', source: 'ICS-CERT', severity: 'critical' },
            { id: 7, title: 'Email Marketing Platform Data Leak', summary: 'Popular email service exposed customer data of over 50,000 businesses.', date: '2026-05-16', source: 'Email Security', severity: 'high' },
            { id: 8, title: 'Android Banking Trojan Discovered', summary: 'New Android malware targets over 200 banking apps, stealing credentials and 2FA codes.', date: '2026-05-16', source: 'MalwareLab', severity: 'high' }
        ];

        function loadData() {
            document.getElementById('incidentsContainer').innerHTML = '<div style="text-align:center;padding:60px;">Loading security intelligence...</div>';
            setTimeout(() => {
                incidents = data;
                document.getElementById('totalCount').innerHTML = incidents.length;
                document.getElementById('updateTime').innerHTML = new Date().toLocaleTimeString();
                filterData();
            }, 500);
        }

        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = incidents.filter(i => {
                const matchFilter = currentFilter === 'all' || i.severity === currentFilter;
                const matchSearch = i.title.toLowerCase().includes(search) || i.summary.toLowerCase().includes(search);
                return matchFilter && matchSearch;
            });
            displayCards(filtered);
        }

        function displayCards(incidentsList) {
            const container = document.getElementById('incidentsContainer');
            if(incidentsList.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:60px;">No incidents found</div>';
                return;
            }
            container.innerHTML = `
                <div class="cards-grid">
                    ${incidentsList.map(i => `
                        <div class="incident-card" onclick="showDetails(${JSON.stringify(i).replace(/"/g, '&quot;')})">
                            <div class="severity-bar severity-${i.severity}"></div>
                            <div class="card-content">
                                <div class="card-header">
                                    <span class="severity-badge severity-${i.severity}">
                                        <i class="fas ${i.severity === 'critical' ? 'fa-skull-crossbones' : i.severity === 'high' ? 'fa-exclamation-triangle' : 'fa-shield-alt'}"></i>
                                        ${i.severity.toUpperCase()}
                                    </span>
                                    <span class="source"><i class="fas fa-newspaper"></i> ${i.source}</span>
                                </div>
                                <h3 class="card-title">${i.title}</h3>
                                <p class="card-summary">${i.summary.substring(0, 120)}...</p>
                                <div class="card-footer">
                                    <span class="date"><i class="far fa-calendar-alt"></i> ${i.date}</span>
                                    <span class="read-more">Read Analysis <i class="fas fa-arrow-right"></i></span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function showDetails(incident) {
            document.getElementById('modalContent').innerHTML = `
                <h2 class="modal-title">${incident.title}</h2>
                <div class="modal-meta">
                    <div class="modal-meta-item"><i class="fas fa-newspaper"></i> Source: ${incident.source}</div>
                    <div class="modal-meta-item"><i class="far fa-calendar-alt"></i> Date: ${incident.date}</div>
                    <div class="modal-meta-item"><i class="fas fa-exclamation-triangle"></i> Severity: ${incident.severity.toUpperCase()}</div>
                </div>
                <p>${incident.summary}</p>
                <button class="modal-button" onclick="window.open('https://thehackernews.com','_blank')">Read Full Analysis →</button>
            `;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function setupFilters() {
            const filters = ['all', 'critical', 'high', 'medium', 'low'];
            const container = document.getElementById('filters');
            container.innerHTML = filters.map(f => `
                <button class="filter-btn ${f === 'all' ? 'active' : ''}" onclick="setFilter('${f}')">
                    ${f.toUpperCase()}
                </button>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterData();
        }

        setupFilters();
        loadData();
        setInterval(loadData, 300000);
    </script>
</body>
</html>
