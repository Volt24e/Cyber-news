<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CyberSec News | Live Security Updates</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Glass Header */
        .glass-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .live-badge {
            background: #ef4444;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Search */
        .search-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 16px;
            color: white;
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            color: white;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .incident-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .incident-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
        }

        .severity-bar {
            height: 4px;
        }

        .card-content {
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .severity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .severity-critical { background: #ef4444; color: white; }
        .severity-high { background: #f59e0b; color: white; }
        .severity-medium { background: #eab308; color: white; }
        .severity-low { background: #10b981; color: white; }

        .source {
            font-size: 12px;
            color: #94a3b8;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-summary {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date {
            font-size: 12px;
            color: #94a3b8;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .auto-update {
            background: rgba(16, 185, 129, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .glass-header { padding: 20px; }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <div class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-shield-haltered"></i>
                    </div>
                    <div class="logo-text">
                        <h1>CyberSec News</h1>
                        <p>Live Security Intelligence</p>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="incidentCount">0</div>
                        <div style="font-size: 11px;">Incidents</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="updateTime">--:--</div>
                        <div style="font-size: 11px;">Last Update</div>
                    </div>
                    <div class="live-badge">
                        <i class="fas fa-circle" style="font-size: 8px;"></i> LIVE
                    </div>
                    <button class="refresh-btn" onclick="fetchNews()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
            <div class="auto-update">
                <i class="fas fa-sync-alt fa-spin"></i>
                Auto-updates every 5 minutes
            </div>
        </div>

        <div class="search-glass">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search incidents..." onkeyup="filterIncidents()">
            </div>
        </div>

        <div class="filters" id="filters"></div>
        <div id="incidentsContainer"></div>
    </div>

    <script>
        let allIncidents = [];
        let currentFilter = 'all';

        // FREE RSS to JSON API (no API key needed!)
        const RSS_SOURCES = [
            { name: 'The Hacker News', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/TheHackersNews' },
            { name: 'Bleeping Computer', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://www.bleepingcomputer.com/feed/' },
            { name: 'Security Week', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://www.securityweek.com/feed' },
            { name: 'Cybersecurity News', url: 'https://api.rss2json.com/v1/api.json?rss_url=https://cybersecuritynews.com/feed/' }
        ];

        // Free News API (alternative - no key needed)
        const FREE_NEWS_API = 'https://gnews.io/api/v4/search?q=cybersecurity%20breach%20attack&lang=en&max=20';

        function getSeverity(title) {
            const text = title.toLowerCase();
            if (text.includes('critical') || text.includes('ransomware') || text.includes('zero-day')) return 'critical';
            if (text.includes('breach') || text.includes('hack') || text.includes('exposed')) return 'high';
            if (text.includes('vulnerability') || text.includes('malware') || text.includes('phishing')) return 'medium';
            return 'low';
        }

        async function fetchNews() {
            document.getElementById('incidentsContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching live cybersecurity news...</p></div>';
            
            let allArticles = [];

            // Method 1: Try RSS feeds (free, no API key)
            for (const source of RSS_SOURCES) {
                try {
                    const response = await fetch(source.url);
                    const data = await response.json();
                    if (data.items) {
                        data.items.forEach(item => {
                            allArticles.push({
                                title: item.title,
                                summary: item.description?.replace(/<[^>]*>/g, '').substring(0, 200) || 'Click to read more',
                                date: new Date(item.pubDate).toLocaleDateString(),
                                source: source.name,
                                link: item.link,
                                severity: getSeverity(item.title)
                            });
                        });
                    }
                } catch (error) {
                    console.log(`Failed to fetch from ${source.name}`);
                }
            }

            // Method 2: Try GNews API (free tier)
            try {
                const response = await fetch(FREE_NEWS_API);
                const data = await response.json();
                if (data.articles) {
                    data.articles.forEach(article => {
                        allArticles.push({
                            title: article.title,
                            summary: article.description?.substring(0, 200) || article.content?.substring(0, 200) || 'Security incident reported',
                            date: new Date(article.publishedAt).toLocaleDateString(),
                            source: article.source?.name || 'Security News',
                            link: article.url,
                            severity: getSeverity(article.title)
                        });
                    });
                }
            } catch (error) {
                console.log('GNews API failed, using RSS only');
            }

            // Remove duplicates (based on title)
            const uniqueArticles = [];
            const titles = new Set();
            for (const article of allArticles) {
                if (!titles.has(article.title)) {
                    titles.add(article.title);
                    uniqueArticles.push(article);
                }
            }

            // Sort by date (newest first)
            uniqueArticles.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            allIncidents = uniqueArticles.slice(0, 50); // Limit to 50 articles
            
            document.getElementById('incidentCount').innerHTML = allIncidents.length;
            document.getElementById('updateTime').innerHTML = new Date().toLocaleTimeString();
            
            if (allIncidents.length === 0) {
                // Fallback to demo data if no news fetched
                allIncidents = getDemoIncidents();
            }
            
            filterIncidents();
        }

        function getDemoIncidents() {
            return [
                { id: 1, title: '🔴 CRITICAL: Major Healthcare Ransomware Attack', summary: 'Healthcare provider hit by ransomware affecting patient records.', date: new Date().toLocaleDateString(), source: 'Demo Feed', link: '#', severity: 'critical' },
                { id: 2, title: '🟠 HIGH: Data Breach Exposes User Records', summary: 'Major data breach exposing millions of user records.', date: new Date().toLocaleDateString(), source: 'Demo Feed', link: '#', severity: 'high' },
                { id: 3, title: '🔴 CRITICAL: Zero-Day Vulnerability Found', summary: 'New zero-day vulnerability being actively exploited.', date: new Date().toLocaleDateString(), source: 'Demo Feed', link: '#', severity: 'critical' }
            ];
        }

        function filterIncidents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allIncidents.filter(incident => {
                const matchesFilter = currentFilter === 'all' || incident.severity === currentFilter;
                const matchesSearch = incident.title.toLowerCase().includes(searchTerm) || 
                                    incident.summary.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });
            displayIncidents(filtered);
        }

        function displayIncidents(incidents) {
            const container = document.getElementById('incidentsContainer');
            if (incidents.length === 0) {
                container.innerHTML = '<div class="loading"><p>No incidents found</p></div>';
                return;
            }

            container.innerHTML = `
                <div class="cards-grid">
                    ${incidents.map(incident => `
                        <div class="incident-card" onclick="window.open('${incident.link}', '_blank')">
                            <div class="severity-bar severity-${incident.severity}"></div>
                            <div class="card-content">
                                <div class="card-header">
                                    <span class="severity-badge severity-${incident.severity}">
                                        <i class="fas ${incident.severity === 'critical' ? 'fa-skull-crossbones' : incident.severity === 'high' ? 'fa-exclamation-triangle' : 'fa-shield-alt'}"></i>
                                        ${incident.severity.toUpperCase()}
                                    </span>
                                    <span class="source"><i class="fas fa-newspaper"></i> ${incident.source}</span>
                                </div>
                                <h3 class="card-title">${incident.title}</h3>
                                <p class="card-summary">${incident.summary.substring(0, 150)}...</p>
                                <div class="card-footer">
                                    <span class="date"><i class="far fa-calendar-alt"></i> ${incident.date}</span>
                                    <span style="color: #a5b4fc;">Read more →</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setupFilters() {
            const filters = ['all', 'critical', 'high', 'medium', 'low'];
            const container = document.getElementById('filters');
            container.innerHTML = filters.map(f => `
                <button class="filter-btn ${f === 'all' ? 'active' : ''}" onclick="setFilter('${f}')">
                    ${f.toUpperCase()}
                </button>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterIncidents();
        }

        // Create particles
        for(let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 15 + Math.random() * 10 + 's';
            document.getElementById('bgAnimation').appendChild(particle);
        }

        setupFilters();
        fetchNews();
        
        // Auto-refresh every 5 minutes
        setInterval(fetchNews, 300000);
    </script>
</body>
</html>
