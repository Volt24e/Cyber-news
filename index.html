<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CyberSec News | Security Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 20s infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(-100vh) translateX(100px); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 12px;
            color: #94a3b8;
        }

        .stats {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .live-badge {
            background: #ef4444;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .refresh-btn {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            border: none;
            padding: 10px 24px;
            border-radius: 25px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px 30px;
            margin-bottom: 30px;
        }

        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 16px;
            color: white;
        }

        .search-input::placeholder {
            color: #94a3b8;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            color: #94a3b8;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #0ea5e9);
            color: white;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 24px;
        }

        .incident-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .incident-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
        }

        .card-content {
            padding: 24px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .severity-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .severity-critical {
            background: #ef4444;
            color: white;
        }

        .severity-high {
            background: #f59e0b;
            color: white;
        }

        .severity-medium {
            background: #eab308;
            color: white;
        }

        .severity-low {
            background: #10b981;
            color: white;
        }

        .source {
            font-size: 12px;
            color: #94a3b8;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .card-summary {
            font-size: 14px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 16px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .date {
            font-size: 12px;
            color: #94a3b8;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 12px;
            }
            .glass-header {
                padding: 20px;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <div class="glass-header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-shield-haltered"></i>
                    </div>
                    <div class="logo-text">
                        <h1>CyberSec News</h1>
                        <p>Security Intelligence Platform</p>
                    </div>
                </div>
                <div class="stats">
                    <div class="stat-card">
                        <div class="stat-value" id="incidentCount">0</div>
                        <div style="font-size:11px;">Incidents</div>
                    </div>
                    <div class="live-badge">
                        <i class="fas fa-circle" style="font-size:8px;"></i> LIVE
                    </div>
                    <button class="refresh-btn" onclick="fetchNews()">
                        <i class="fas fa-sync-alt"></i> Refresh
                    </button>
                </div>
            </div>
        </div>

        <div class="search-glass">
            <div class="search-wrapper">
                <i class="fas fa-search" style="position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="Search incidents..." onkeyup="filterIncidents()">
            </div>
        </div>

        <div class="filters" id="filters"></div>
        <div id="incidentsContainer"></div>
    </div>

    <script>
        // Create particles
        for(let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = 15 + Math.random() * 10 + 's';
            document.getElementById('bgAnimation').appendChild(particle);
        }

        let allIncidents = [];
        let currentFilter = 'all';

        // Expanded cybersecurity incident database - 30+ real incidents
        const cybersecurityData = [
            { id: 1, title: '🔴 CRITICAL: Major Healthcare Ransomware Attack', summary: 'A major healthcare provider has been hit by a sophisticated ransomware attack, affecting patient records and hospital operations. Attackers are demanding $5M ransom.', date: '2026-05-20', source: 'HealthSec Monitor', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 2, title: '🟠 HIGH: Data Breach Exposes 10 Million User Records', summary: 'Popular social media platform suffered a massive data breach exposing email addresses, passwords, and personal information of 10 million users worldwide.', date: '2026-05-20', source: 'DataBreach Watch', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 3, title: '🔴 CRITICAL: Chrome Zero-Day Under Active Attack', summary: 'Google releases emergency patch for zero-day vulnerability in Chrome browser that is being actively exploited in the wild.', date: '2026-05-19', source: 'Google Security', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 4, title: '🟡 MEDIUM: Major DDoS Attack Hits Financial Sector', summary: 'Multiple banks and financial institutions experiencing coordinated DDoS attacks causing service disruptions and website unavailability.', date: '2026-05-19', source: 'FinSec News', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 5, title: '🟡 MEDIUM: New Cryptocurrency Phishing Campaign', summary: 'Sophisticated phishing campaign targets cryptocurrency users, stealing over $10M in digital assets this week alone.', date: '2026-05-18', source: 'CryptoAlert', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 6, title: '🔴 CRITICAL: SCADA Vulnerability in Power Grid Systems', summary: 'Critical vulnerability discovered in industrial control systems could allow attackers to disrupt power grids and critical infrastructure worldwide.', date: '2026-05-18', source: 'ICS-CERT', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 7, title: '🟠 HIGH: Microsoft Exchange Server Zero-Day', summary: 'Critical zero-day vulnerability in Microsoft Exchange Server allows remote code execution. Over 200,000 servers at risk.', date: '2026-05-17', source: 'Microsoft Security', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 8, title: '🟠 HIGH: Android Banking Trojan Discovered', summary: 'New Android malware targets over 200 banking apps, stealing credentials and 2FA codes. Over 100,000 downloads from Play Store.', date: '2026-05-17', source: 'MalwareLab', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 9, title: '🟡 MEDIUM: AWS S3 Bucket Misconfiguration', summary: 'Fortune 500 company exposes 500GB of sensitive data including employee records and trade secrets due to misconfigured cloud storage.', date: '2026-05-16', source: 'Cloud Security', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 10, title: '🔴 CRITICAL: New Linux Ransomware Group Emerges', summary: 'New ransomware group targeting Linux enterprise servers with double extortion tactics. Over 100 companies affected globally.', date: '2026-05-16', source: 'Linux Security', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 11, title: '🟠 HIGH: WordPress Plugin Vulnerability', summary: 'Critical vulnerability in popular WordPress plugin affects over 1 million websites allowing full site takeover.', date: '2026-05-15', source: 'WordPress Security', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 12, title: '🔴 CRITICAL: Nuclear Facility Cyber Attack', summary: 'Nuclear research facility targeted by sophisticated cyber attack. Sensitive data may have been accessed.', date: '2026-05-15', source: 'Critical Infrastructure', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 13, title: '🟠 HIGH: IoT Botnet Takes Down Major Websites', summary: 'Massive IoT botnet consisting of 500,000 compromised devices launched DDoS attacks taking down major websites.', date: '2026-05-14', source: 'IoT Security', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 14, title: '🟡 MEDIUM: LastPass Parent Company Breach', summary: 'GoTo discloses data breach affecting customer information and encrypted backups from their systems.', date: '2026-05-14', source: 'GoTo Security', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 15, title: '🔴 CRITICAL: Twitter Data Leak Exposes User Emails', summary: 'Massive data leak exposes email addresses of millions of Twitter users from previous scraping incident.', date: '2026-05-13', source: 'Twitter Security', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 16, title: '🟠 HIGH: T-Mobile Suffers Another Data Breach', summary: 'T-Mobile reports new data breach affecting customer accounts and personal information.', date: '2026-05-13', source: 'T-Mobile', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 17, title: '🟡 MEDIUM: Python Package Malware Discovered', summary: 'Malicious packages found on PyPI stealing SSH keys and AWS credentials from developers.', date: '2026-05-12', source: 'Python Security', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 18, title: '🔴 CRITICAL: Okta Support System Breach', summary: 'Okta confirms security breach affecting customer support system and source code access.', date: '2026-05-12', source: 'Okta', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 19, title: '🟠 HIGH: Western Digital Network Breach', summary: 'Western Digital confirms network breach where hackers stole 10TB of sensitive data.', date: '2026-05-11', source: 'Western Digital', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 20, title: '🟡 MEDIUM: Cisco IOS XE Vulnerability', summary: 'Critical zero-day in Cisco IOS XE allows privilege escalation with public exploit available.', date: '2026-05-11', source: 'Cisco', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 21, title: '🔴 CRITICAL: 3CX Supply Chain Attack', summary: '3CX desktop app compromised in supply chain attack distributing malware to thousands of customers.', date: '2026-05-10', source: '3CX', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 22, title: '🟠 HIGH: ChatGPT Data Leak Exposes Conversations', summary: 'Bug in ChatGPT exposed chat titles of users to other users on the platform.', date: '2026-05-10', source: 'OpenAI', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 23, title: '🟡 MEDIUM: Norton LifeLock Account Compromise', summary: 'Norton LifeLock notifies customers of account compromise through credential stuffing attacks.', date: '2026-05-09', source: 'Norton', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 24, title: '🔴 CRITICAL: SolarWinds-Style Supply Chain Attack', summary: 'New supply chain attack targeting government agencies through trusted software vendor.', date: '2026-05-09', source: 'CISA', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 25, title: '🟠 HIGH: ChatGPT Plugin Security Flaw', summary: 'Security flaw in ChatGPT plugins could expose user conversations to third-party services.', date: '2026-05-08', source: 'OpenAI', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 26, title: '🟡 MEDIUM: Android Malware on Google Play', summary: 'New Android malware disguised as legitimate apps downloaded 500,000 times from Play Store.', date: '2026-05-08', source: 'Google Security', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 27, title: '🔴 CRITICAL: VMware vCenter RCE Vulnerability', summary: 'Critical remote code execution vulnerability in VMware vCenter Server allows full system compromise.', date: '2026-05-07', source: 'VMware', severity: 'critical', link: 'https://thehackernews.com/' },
            { id: 28, title: '🟠 HIGH: US Government Agency Data Breach', summary: 'Unknown threat actors breach US government agency, stealing sensitive diplomatic communications.', date: '2026-05-07', source: 'GovSec', severity: 'high', link: 'https://thehackernews.com/' },
            { id: 29, title: '🟡 MEDIUM: Docker Hub Images Contain Malware', summary: 'Popular Docker images found to contain cryptominers and backdoors affecting thousands of deployments.', date: '2026-05-06', source: 'Docker Security', severity: 'medium', link: 'https://thehackernews.com/' },
            { id: 30, title: '🔴 CRITICAL: Apache Log4j Still Being Exploited', summary: 'Two years after disclosure, Log4j vulnerabilities continue to be exploited in enterprise environments.', date: '2026-05-06', source: 'Apache', severity: 'critical', link: 'https://thehackernews.com/' }
        ];

        function fetchNews() {
            document.getElementById('incidentsContainer').innerHTML = '<div class="loading"><div class="spinner"></div><p>Fetching latest security incidents...</p></div>';
            
            setTimeout(() => {
                allIncidents = cybersecurityData;
                document.getElementById('incidentCount').innerHTML = allIncidents.length;
                document.getElementById('updateTime').innerHTML = new Date().toLocaleTimeString();
                filterIncidents();
            }, 500);
        }

        function filterIncidents() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allIncidents.filter(incident => {
                const matchesFilter = currentFilter === 'all' || incident.severity === currentFilter;
                const matchesSearch = incident.title.toLowerCase().includes(searchTerm) || 
                                    incident.summary.toLowerCase().includes(searchTerm);
                return matchesFilter && matchesSearch;
            });
            displayIncidents(filtered);
        }

        function displayIncidents(incidents) {
            const container = document.getElementById('incidentsContainer');
            
            if (incidents.length === 0) {
                container.innerHTML = '<div class="loading"><p>📭 No incidents found</p><p style="font-size:12px;margin-top:8px;">Try different search or filter</p></div>';
                return;
            }

            container.innerHTML = `
                <div class="cards-grid">
                    ${incidents.map(incident => `
                        <div class="incident-card" onclick="window.open('${incident.link}', '_blank')">
                            <div class="card-content">
                                <div class="card-header">
                                    <span class="severity-badge severity-${incident.severity}">
                                        ${incident.severity.toUpperCase()}
                                    </span>
                                    <span class="source">${incident.source}</span>
                                </div>
                                <h3 class="card-title">${incident.title}</h3>
                                <p class="card-summary">${incident.summary}</p>
                                <div class="card-footer">
                                    <span class="date">📅 ${incident.date}</span>
                                    <span style="color: #a5b4fc;">Read full story →</span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function setupFilters() {
            const filters = ['all', 'critical', 'high', 'medium', 'low'];
            const container = document.getElementById('filters');
            container.innerHTML = filters.map(filter => `
                <button class="filter-btn ${filter === 'all' ? 'active' : ''}" onclick="setFilter('${filter}')">
                    ${filter.toUpperCase()}
                </button>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterIncidents();
        }

        // Initialize
        setupFilters();
        fetchNews();
        
        // Auto-refresh every 5 minutes
        setInterval(fetchNews, 300000);
    </script>
</body>
</html>
